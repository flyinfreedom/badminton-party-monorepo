<mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center" #tabGroup>
  <mat-tab label="我加入的羽球團" *ngIf="joinedGroups.length">
    <app-group-list [groups]="joinedGroups"></app-group-list>
  </mat-tab>
  <mat-tab label="我建立的羽球團" *ngIf="createdGroup.length">
    <app-group-list [groups]="createdGroup" [show-avatar]="false"></app-group-list>
  </mat-tab>
</mat-tab-group>

<div class="text-center no-group" *ngIf="inited && createdGroup.length === 0 && joinedGroups.length === 0">

  <div class="mt-3 mb-1">
    <mat-icon>add_task</mat-icon>
  </div>

  您目前沒有加入或建立任何的羽球團<br/>
  可至羽球社群尋找或是建立一個新的!<br/><br/>
  也可以從球館搜尋
</div>
<div class="text-center" *ngIf="inited && createdGroup.length === 0 && joinedGroups.length === 0">
  <button class="btn btn-primary" style="margin: 0 auto" routerLink="/search-court">尋找羽球館</button>
</div>

<div class="create_group_button">
  <img src="../../../assets/img/create_group_icon.svg" routerLink="/create-group" />
</div>
